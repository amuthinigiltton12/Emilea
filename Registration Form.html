<html>
    <title>
        Registration Form
    </title>
    <body>
       <h1> User Details</h1>
       <form>
       <fieldset>
       <legend>Personal Data</legend>
       <label>
        First Name :
       </label>
       <input type="text" id="fname" name="fname"><br><br>
       <label>
        Last Name :
       </label>
       <input type="text" id="lname" name="lname"><br><br>
       <label>
        E-mail Address
       </label>
        <input type="email" id="email" name="email"><br><br>
       <label>
        Password:
       </label>
       <input type="password" name="password"><br><br>
       
        <label>
            Gender:
        </label><br><br>
        <input type="radio" name="subject" value="Male">Male<br><br>
        <input type="radio" name="subject" value="Female">Female<br><br>
        <input type="radio" name="subject" value="Other">Other<br><br>
        <label for="email">
            Address:
        </label><br><br>
        <textarea rows="5" cols="50" name="description">Enter Address here</textarea><br><br><br><br>
        <label>
            Music:
        </label>
        <input type="file" name="fileupload" accept="audio/*" />
        <center>
        <input type="submit" name="Submit" value="Submit"/>
        <input type="reset" name="reset" value="Reset"/>
        </center>
        
    </fieldset>
    </form>
    </body>
</html>
