<html>
    <head>
        <title>
            My Ice-Cream Menu Card
        </title>
        <style>
            h1 {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-weight: bold;
            font-size: 50px;
            color:rgb(7, 129, 7);
            border-radius: 20px;
            border-color: rgb(5, 78, 5);
            background-color: rgb(120, 185, 55);
            border-style: groove;
            margin-bottom: 20px;
            text-align:center;
            line-height: 50px;
            height: 50px;
            width: 300px;
            margin:auto
            }
            
            h1 + p {
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
                font-size: 25px;
                font-weight: lighter;
                color: rgb(39, 160, 160);
                border-radius: 20px;
                border-color: rgb(11, 110, 110);
                background-color:rgb(170, 252, 252);
                border-style:groove;
                line-height: 55px;
                height:55px;
                width:600px;
                text-align:center;
                width: 50%;       
                margin: 40 auto;              

            }
            ul > li  {
            list-style: none; 
      background-color: #baa1d6;
      color: #6a1e8d;
      font-size: 18px;
      font-weight: bold;
      margin: 10px auto;
      padding: 12px;
      border-radius: 20px;
      border: 3px solid #25053a;
      border-style: groove;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      text-align:center;
      font-size:25px;
      font-weight: lighter;
      width:400px;
      height:25px;

            }
            .menu-holder {
             width: 480px;
      background-color: rgb(218, 223, 231);
      border: 3px solid #848fc2;
      border-radius: 15px;
      margin: 20px auto;
      padding: 20px;
            }
            ul > li:hover {
      background-color: #dd0e0e;
      color: rgb(226, 140, 140);
      cursor: pointer;
      transform: scale(1.05);
            }
           ul > li:nth-child(3) {
            background-color:pink;
            color:rgb(236, 86, 111);
            border-color:rgb(236, 48, 80)
           }
          .order {
            display:block;
            background-color:rgb(3, 77, 77);
            color:aquamarine;
            border:3px solid;
            border-radius:5px;
            
            border-color: rgb(1, 27, 27);
            height:45px;
           
            text-align: center;

            width: 8%;       
            margin: 40px auto; 
            
           }
 

        </style>
    </head>
    <body style="background-color: rgb(226, 202, 205);">
        <h1>Cold Bliss</h1>
        
        <p class="shop-summary">Get ready for a sweet and amazing adventure!</p>
       <div class="menu-holder">
        <ul>
            <li>Cotton Sugar</li>
            <li>Espresso Grind</li>
            <li>Sunday Special!- Golden Honeycomb</li>
            <li>Salted Paradox</li>
            <li>Raspberry Blink</li>
            <li>Fudge Craze</li>
        </ul>
        </div>
        <button class="order">Order now!</button>
    </body>
</html>
